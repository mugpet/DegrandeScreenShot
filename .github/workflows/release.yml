name: Build Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Semantic version to publish, for example 0.1.0"
        required: true
        type: string
      signpathEnabled:
        description: "Enable SignPath signing steps"
        required: false
        default: false
        type: boolean

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
      id-token: write
      actions: read

    env:
      SOLUTION_PATH: DegrandeScreenShot.sln
      APP_PROJECT: src/DegrandeScreenShot.App/DegrandeScreenShot.App.csproj
      PUBLISH_DIR: artifacts/publish/win-x64
      INSTALLER_DIR: artifacts/installer
      PORTABLE_DIR: artifacts/portable
      SIGNPATH_ENABLED: ${{ github.event_name == 'workflow_dispatch' && inputs.signpathEnabled || 'false' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ inputs.version }}"
          }
          else {
            $version = "${{ github.ref_name }}" -replace '^v', ''
          }

          if ($version -notmatch '^\d+\.\d+\.\d+$') {
            throw "Version '$version' must follow semantic versioning (major.minor.patch)."
          }

          "value=$version" >> $env:GITHUB_OUTPUT

      - name: Restore solution
        run: dotnet restore $env:SOLUTION_PATH

      - name: Test solution
        run: dotnet test $env:SOLUTION_PATH -c Release --no-restore

      - name: Publish self-contained app
        shell: pwsh
        run: |
          dotnet publish $env:APP_PROJECT `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:DebugType=None `
            -p:DebugSymbols=false `
            -p:Version=${{ steps.version.outputs.value }} `
            -p:AssemblyVersion=${{ steps.version.outputs.value }}.0 `
            -p:FileVersion=${{ steps.version.outputs.value }}.0 `
            -p:InformationalVersion=${{ steps.version.outputs.value }} `
            -o $env:PUBLISH_DIR

      - name: Upload unsigned app for signing
        id: upload-unsigned-app
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-app
          path: ${{ env.PUBLISH_DIR }}/DegrandeScreenShot.App.exe
          if-no-files-found: error

      - name: Validate SignPath token
        if: ${{ env.SIGNPATH_ENABLED == 'true' }}
        shell: pwsh
        env:
          SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
        run: |
          $organizationId = "f929bb63-e6fe-41f4-ab4a-ab44038c10d1"
          $projectSlug = "degrande-screenshot"
          $signingPolicySlug = "release-signing"
          $token = $env:SIGNPATH_API_TOKEN

          if ([string]::IsNullOrWhiteSpace($token)) {
            throw "SIGNPATH_API_TOKEN is empty or missing."
          }

          $trimmedToken = $token.Trim()
          if ($trimmedToken.Length -ne $token.Length) {
            Write-Host "SIGNPATH_API_TOKEN has leading or trailing whitespace. Raw length: $($token.Length), trimmed length: $($trimmedToken.Length)."
          }

          $sha256 = [System.Security.Cryptography.SHA256]::Create()
          try {
            $hashBytes = $sha256.ComputeHash([System.Text.Encoding]::UTF8.GetBytes($trimmedToken))
          }
          finally {
            $sha256.Dispose()
          }
          $hash = ([BitConverter]::ToString($hashBytes) -replace '-', '').ToLowerInvariant()
          Write-Host "SIGNPATH_API_TOKEN trimmed length: $($trimmedToken.Length)"
          Write-Host "SIGNPATH_API_TOKEN sha256: $hash"

          $headers = @{ Authorization = "Bearer $trimmedToken" }
          $uri = "https://app.signpath.io/api/v1/$organizationId/Cryptoki/MySigningPolicies?projectSlug=$projectSlug&signingPolicySlug=$signingPolicySlug"
          try {
            $result = Invoke-RestMethod -Headers $headers -Uri $uri -Method Get
            Write-Host "SignPath token can access $projectSlug/$signingPolicySlug."
          }
          catch {
            if ($_.Exception.Response) {
              $statusCode = [int]$_.Exception.Response.StatusCode
              $statusDescription = $_.Exception.Response.StatusDescription
              $stream = $_.Exception.Response.GetResponseStream()
              $body = ""
              if ($stream) {
                $reader = New-Object System.IO.StreamReader($stream)
                $body = $reader.ReadToEnd()
              }
              throw "SignPath token validation failed: HTTP $statusCode $statusDescription $body"
            }

            throw
          }

      - name: Sign app via SignPath
        if: ${{ env.SIGNPATH_ENABLED == 'true' }}
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: f929bb63-e6fe-41f4-ab4a-ab44038c10d1
          project-slug: degrande-screenshot
          signing-policy-slug: release-signing
          github-artifact-id: ${{ steps.upload-unsigned-app.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: ${{ env.PUBLISH_DIR }}

      - name: Create portable package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path $env:PORTABLE_DIR | Out-Null
          $zipPath = Join-Path $env:PORTABLE_DIR "DegrandeScreenShot-${{ steps.version.outputs.value }}-win-x64-portable.zip"
          Compress-Archive -Path (Join-Path $env:PUBLISH_DIR '*') -DestinationPath $zipPath -Force

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path $env:INSTALLER_DIR | Out-Null
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          & $iscc "/DAppVersion=${{ steps.version.outputs.value }}" "/DPublishDir=$env:GITHUB_WORKSPACE\$env:PUBLISH_DIR" "/DOutputDir=$env:GITHUB_WORKSPACE\$env:INSTALLER_DIR" "$env:GITHUB_WORKSPACE\installer\DegrandeScreenShot.iss"

      - name: Upload unsigned installer for signing
        id: upload-unsigned-installer
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-installer
          path: ${{ env.INSTALLER_DIR }}/*.exe
          if-no-files-found: error

      - name: Sign installer via SignPath
        if: ${{ env.SIGNPATH_ENABLED == 'true' }}
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: f929bb63-e6fe-41f4-ab4a-ab44038c10d1
          project-slug: degrande-screenshot
          signing-policy-slug: release-signing
          github-artifact-id: ${{ steps.upload-unsigned-installer.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: ${{ env.INSTALLER_DIR }}

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: DegrandeScreenShot-${{ steps.version.outputs.value }}
          path: |
            ${{ env.INSTALLER_DIR }}/*.exe
            ${{ env.PORTABLE_DIR }}/*.zip
          if-no-files-found: error

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ${{ env.INSTALLER_DIR }}/*.exe
            ${{ env.PORTABLE_DIR }}/*.zip
